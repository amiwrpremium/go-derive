---
# Codacy configuration — https://docs.codacy.com/repositories-configure/codacy-configuration-file/
#
# Notes
#   - Tools cannot be enabled / disabled here. Use the Codacy web UI for that
#     (Settings → Code patterns). The blocks under `engines:` only configure
#     tools that the UI has already enabled.
#   - When this file is present, it takes precedence over UI-based ignore
#     patterns for the paths it covers.
#   - Codacy always reads the copy of this file on the **default branch**.

# Disabled rules (must be toggled off in Codacy UI; cannot be set here):
#   - revive/package-comments — many of our packages have docs on
#     a sibling doc.go file that Revive's heuristic does not follow,
#     producing 80+ noise alerts.
#   - revive/var-naming — Codacy's preset flags exported identifiers
#     that already follow Go's MixedCaps convention.

# Global path exclusions — applied to every analysis tool.
exclude_paths:
  - 'examples/**'             # runnable demos, not unit code
  - 'test/**'                 # build-tagged integration tests
  - 'internal/testutil/**'    # mocks & helpers used only by tests
  - '**/*_test.go'            # all test sources
  - '**/example_*.go'         # godoc Example_* functions
  - 'docs/**'                 # markdown
  - 'vendor/**'               # vendored deps if ever introduced
  - 'go.sum'                  # checksum database

# Per-tool configuration. Each block applies only if the tool is enabled
# in the Codacy UI.
engines:
  gosec:
    exclude_paths:
      - 'examples/**'
      - 'test/**'
      - 'internal/testutil/**'

  staticcheck:
    exclude_paths:
      - 'examples/**'
      - 'test/**'
      - 'internal/testutil/**'

  revive:
    exclude_paths:
      - 'examples/**'
      - 'test/**'
      - 'internal/testutil/**'

  gofmt:
    exclude_paths:
      - 'examples/**'
      - 'vendor/**'

  duplication:
    exclude_paths:
      - 'examples/**'         # examples deliberately repeat boilerplate
      - 'test/**'
      - '**/*_test.go'
      - 'docs/**'

  # CHANGELOG.md is generated by release-please (uses `*` bullets);
  # CODE_OF_CONDUCT.md is the Contributor Covenant template.
  markdownlint:
    exclude_paths:
      - 'CHANGELOG.md'
      - 'CODE_OF_CONDUCT.md'

  # CODE_OF_CONDUCT.md uses Contributor-Covenant cross-section
  # reference links the linter cannot resolve. CHANGELOG.md is
  # auto-generated by release-please and uses inline link syntax
  # the linter sometimes mis-parses.
  remark-lint:
    exclude_paths:
      - 'CHANGELOG.md'
      - 'CODE_OF_CONDUCT.md'

  # CKV_GHA_7 forbids workflow_dispatch.inputs. We use them
  # legitimately — see docs/release-process.md:
  #   - release.yml         tag input for manual re-release
  #   - verify-release.yml  tag input for ad-hoc artifact verify
  #   - integration.yml     run_live_orders flag for testnet creds
  checkov:
    exclude_paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/verify-release.yml'
      - '.github/workflows/integration.yml'
