# OpenSSF Security Insights specification 1.0.0
# https://github.com/ossf/security-insights-spec
#
# Machine-readable summary of the project's security posture. Consumed by
# OpenSSF Scorecard, Sigstore tooling, and downstream package indexers.

header:
  schema-version: 1.0.0
  expiration-date: '2028-01-01T00:00:00.000Z'
  last-updated: '2026-05-04'
  last-reviewed: '2026-05-04'
  project-url: https://github.com/amiwrpremium/go-derive
  project-release: ''
  changelog: https://github.com/amiwrpremium/go-derive/blob/master/CHANGELOG.md
  license: https://github.com/amiwrpremium/go-derive/blob/master/LICENSE

project-lifecycle:
  status: active
  bug-fixes-only: false
  core-maintainers:
    - https://github.com/amiwrpremium

contribution-policy:
  accepts-pull-requests: true
  accepts-automated-pull-requests: true
  contributing-policy: https://github.com/amiwrpremium/go-derive/blob/master/CONTRIBUTING.md
  code-of-conduct: https://github.com/amiwrpremium/go-derive/blob/master/CODE_OF_CONDUCT.md

documentation:
  - https://pkg.go.dev/github.com/amiwrpremium/go-derive
  - https://github.com/amiwrpremium/go-derive/blob/master/README.md
  - https://github.com/amiwrpremium/go-derive/blob/master/docs/architecture.md

distribution-points:
  - https://pkg.go.dev/github.com/amiwrpremium/go-derive
  - https://github.com/amiwrpremium/go-derive/releases

security-artifacts:
  threat-model:
    threat-model-created: true
    evidence-url:
      - name: Threat model
        url: https://github.com/amiwrpremium/go-derive/blob/master/docs/security/threat-model.md
  self-assessment:
    self-assessment-created: false
    evidence-url: []

security-testing:
  - tool-type: sca
    tool-name: govulncheck
    tool-version: latest
    tool-url: https://pkg.go.dev/golang.org/x/vuln/cmd/govulncheck
    integration:
      ad-hoc: false
      ci: true
      before-release: true
    tool-rulesets: []
    comment: |
      Run on every push and PR via .github/workflows/ci.yml. Scans the
      module against the Go vulnerability database.

  - tool-type: sca
    tool-name: OSV-Scanner
    tool-version: v2.0.0
    tool-url: https://github.com/google/osv-scanner
    integration:
      ad-hoc: false
      ci: true
      before-release: true
    tool-rulesets: []
    comment: |
      Run on push, PR, and weekly via .github/workflows/osv-scanner.yml.
      Cross-checks transitive deps against osv.dev.

  - tool-type: sast
    tool-name: CodeQL
    tool-version: v3
    tool-url: https://codeql.github.com/
    integration:
      ad-hoc: false
      ci: true
      before-release: true
    tool-rulesets:
      - security-and-quality
    comment: Configured in .github/workflows/codeql.yml.

  - tool-type: sast
    tool-name: gosec
    tool-version: latest
    tool-url: https://github.com/securego/gosec
    integration:
      ad-hoc: false
      ci: true
      before-release: true
    tool-rulesets: []
    comment: Configured in .github/workflows/gosec.yml.

  - tool-type: sast
    tool-name: Codacy
    tool-version: latest
    tool-url: https://www.codacy.com/
    integration:
      ad-hoc: false
      ci: true
      before-release: false
    tool-rulesets: []
    comment: Configured in .github/workflows/codacy.yml.

  - tool-type: scorecard
    tool-name: OpenSSF Scorecard
    tool-version: v2.4.0
    tool-url: https://github.com/ossf/scorecard
    integration:
      ad-hoc: false
      ci: true
      before-release: false
    tool-rulesets: []
    comment: Weekly + on push via .github/workflows/scorecard.yml.

security-assessments:
  - auditor-name: ''
    auditor-url: ''
    auditor-report: ''
    report-year: 0
    comment: No third-party audit yet.

security-contacts:
  - type: website
    value: https://github.com/amiwrpremium/go-derive/security/advisories/new
    primary: true
    comment: Use GitHub's private vulnerability reporting flow.

vulnerability-reporting:
  accepts-vulnerability-reports: true
  email-contact: ''
  security-policy: https://github.com/amiwrpremium/go-derive/blob/master/SECURITY.md
  bug-bounty-available: false
  bug-bounty-url: ''
  out-scope:
    - dependencies (report upstream)
    - examples/ programs (demonstrations only)

dependencies:
  third-party-packages: true
  dependencies-lists:
    - https://github.com/amiwrpremium/go-derive/blob/master/go.mod
  sbom:
    - sbom-file: go-derive-sbom.cdx.json
      sbom-format: CycloneDX
      sbom-url: https://github.com/amiwrpremium/go-derive/releases/latest/download/go-derive-sbom.cdx.json
    - sbom-file: go-derive-sbom.spdx.json
      sbom-format: SPDX
      sbom-url: https://github.com/amiwrpremium/go-derive/releases/latest/download/go-derive-sbom.spdx.json
  dependencies-lifecycle:
    policy-url: https://github.com/amiwrpremium/go-derive/blob/master/renovate.json
    comment: |
      Renovate (primary) opens grouped non-major PRs weekly with auto-merge
      for patch/minor. Dependabot is configured with
      `open-pull-requests-limit: 0` so it does not duplicate routine version
      bumps; it stays active solely to surface security-update PRs from
      GitHub's vulnerability database (those are not capped by that flag).
      Major bumps for go-ethereum and gorilla/websocket require manual
      review per Renovate package rules.
  env-dependencies-policy:
    policy-url: ''
    comment: Standard Go module versioning; no native deps.
