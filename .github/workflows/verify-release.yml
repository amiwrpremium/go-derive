name: verify-release

# After release.yml publishes its artefacts, this workflow re-downloads
# them as a third party would and re-verifies:
#   1. The cosign keyless signature on each SBOM + license CSV.
#   2. The SLSA Level 3 provenance for the release tag.
#
# A passing run is the SDK's continuous proof to consumers that the
# attestations on the release page are valid right now (not just at
# publish time).

on:
  release:
    types: [published]
  schedule:
    - cron: '23 7 * * 1'  # Mondays at 07:23 UTC — re-verify weekly
  # The optional `tag` input is validated against the canonical SemVer
  # form inside both jobs' "Resolve tag" steps before any download or
  # verification runs — an attacker can't smuggle shell metacharacters
  # or arbitrary refs through it. Checkov CKV_GHA_7 may still flag the
  # `inputs:` block on a presence-only basis; see docs/known-tool-issues.md.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to verify (defaults to latest).'
        required: false

permissions:
  contents: read
  id-token: write   # required by some sigstore APIs even for verify

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cosign-verify:
    name: cosign verify
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REL_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
            # Reject anything that isn't a canonical SemVer tag so the
            # input can't smuggle shell metacharacters, path traversal,
            # or arbitrary git refs into the downstream gh-release-download
            # / verifier commands.
            if ! [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::Invalid tag format: '$INPUT_TAG' (expected vX.Y.Z[-pre])"
              exit 1
            fi
            tag="$INPUT_TAG"
          elif [ -n "$REL_TAG" ]; then
            tag="$REL_TAG"
          else
            tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' \
                  --repo amiwrpremium/go-derive)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download artefacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir verify && cd verify
          # Pull every signable artefact + bundle.
          gh release download "$TAG" --repo amiwrpremium/go-derive \
             --pattern 'go-derive-sbom.cdx.json*' \
             --pattern 'go-derive-sbom.spdx.json*' \
             --pattern 'go-derive-licenses.csv*'

      - name: Verify each cosign bundle
        env:
          OWNER: amiwrpremium
          REPO: go-derive
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cd verify
          fail=0
          for f in go-derive-sbom.cdx.json go-derive-sbom.spdx.json go-derive-licenses.csv; do
            if [ ! -f "$f" ] || [ ! -f "$f.cosign-bundle" ]; then
              echo "::warning::skipping $f — artefact or bundle missing"
              continue
            fi
            echo "::group::verify $f"
            cosign verify-blob \
              --bundle "$f.cosign-bundle" \
              --certificate-identity-regexp "https://github.com/${OWNER}/${REPO}/.github/workflows/release.yml@refs/tags/${TAG}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$f" || fail=1
            echo "::endgroup::"
          done
          exit $fail

  slsa-verify:
    name: slsa verify
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.3'
          cache: true

      - name: Resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REL_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
            # Reject anything that isn't a canonical SemVer tag so the
            # input can't smuggle shell metacharacters, path traversal,
            # or arbitrary git refs into the downstream gh-release-download
            # / verifier commands.
            if ! [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::Invalid tag format: '$INPUT_TAG' (expected vX.Y.Z[-pre])"
              exit 1
            fi
            tag="$INPUT_TAG"
          elif [ -n "$REL_TAG" ]; then
            tag="$REL_TAG"
          else
            tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' \
                  --repo amiwrpremium/go-derive)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install slsa-verifier
        # renovate: datasource=go depName=github.com/slsa-framework/slsa-verifier/v2
        run: go install github.com/slsa-framework/slsa-verifier/v2/cli/slsa-verifier@v2.7.1

      - name: Download SLSA provenance + an artefact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir verify && cd verify
          gh release download "$TAG" --repo amiwrpremium/go-derive \
             --pattern 'go-derive.intoto.jsonl' \
             --pattern 'go-derive-sbom.cdx.json'

      - name: Verify SLSA provenance
        env:
          OWNER: amiwrpremium
          REPO: go-derive
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cd verify
          # Verify against the artefact we downloaded — slsa-verifier
          # checks the provenance was produced by the SLSA L3 generator
          # for our repo at the expected tag.
          slsa-verifier verify-artifact \
            --provenance-path go-derive.intoto.jsonl \
            --source-uri "github.com/${OWNER}/${REPO}" \
            --source-tag "$TAG" \
            go-derive-sbom.cdx.json
