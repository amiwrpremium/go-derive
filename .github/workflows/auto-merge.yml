name: auto-merge

# Auto-merge eligible Dependabot PRs once required checks pass.
#
# Renovate already automerges its own PRs (see renovate.json). This
# workflow handles Dependabot:
#
#   - patch / minor: enable auto-merge, --squash
#   - major:         leave alone, comment a reminder
#   - review-required label present (set by the dependabot.yml rules
#     for go-ethereum and gorilla/websocket): always leave alone
#
# Auto-merge is gated by branch protection / rulesets — the PR only
# actually merges once `required` (the ci.yml rollup) and the other
# required checks are green.
#
# `pull_request_target` runs the workflow file from the base branch
# (not the PR head), so it has the secrets and write permission it
# needs without executing untrusted code.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read

jobs:
  dependabot:
    name: dependabot auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: skip if labeled review-required
        if: contains(github.event.pull_request.labels.*.name, 'review-required')
        run: |
          set -euo pipefail
          echo "PR is labeled review-required — leaving for manual review."
          exit 0

      - name: enable auto-merge for patch and minor
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_URL"

      - name: comment on major bumps
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_URL" --body \
            "Major version bump detected — auto-merge skipped. A maintainer will review and merge manually."
