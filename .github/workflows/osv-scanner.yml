name: osv-scanner

# OSV-Scanner cross-checks the dependency graph against the OSV database
# (osv.dev) and uploads SARIF to GitHub code scanning. It complements
# govulncheck (which only sees Go-affecting CVEs) by covering the full
# transitive graph including non-Go components.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '47 6 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  scan-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: google/osv-scanner-action/.github/actions/osv-scanner-action@98b584ee2ed2da3935ccce10e06739d54cdcd20b # v2.0.0
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  scan-scheduled:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: google/osv-scanner-action/.github/actions/osv-scanner-action@98b584ee2ed2da3935ccce10e06739d54cdcd20b # v2.0.0
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
      - uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        if: always()
        with:
          sarif_file: results.sarif
