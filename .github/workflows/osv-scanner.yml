name: osv-scanner

# OSV-Scanner cross-checks the dependency graph against the OSV database
# (osv.dev) and uploads SARIF to GitHub code scanning. It complements
# govulncheck (which only sees Go-affecting CVEs) by covering the full
# transitive graph including non-Go components.
#
# Calls the maintainer-recommended reusable workflow
# (.github/workflows/osv-scanner-reusable.yml) at the job level — that
# workflow does its own checkout, runs the scanner, and uploads SARIF.
# Reusable-workflow callers can't add their own steps, so step-security/
# harden-runner is not in this file; the reusable workflow is
# google-maintained and uses pinned actions internally.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '47 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-pr:
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./

  scan-scheduled:
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
