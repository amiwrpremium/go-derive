name: extra-lint

# Linters that aren't Go-specific. Each is a separate job so a failure
# in one doesn't mask others. All four are added to ci.yml's `required`
# rollup (cross-workflow status checks via the workflow's job names).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !node_modules
            !vendor
            !.git

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          config_file: .yamllint.yml
          strict: true
          format: github

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          # `github-check` posts annotations and the `error` fail-level
          # makes the job fail if actionlint reports any issue. The
          # action installs shellcheck on the runner, so actionlint
          # auto-runs it on every `run:` block.
          reporter: github-check
          fail_level: error

  editorconfig:
    name: editorconfig-checker
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c # v2.2.0
      - run: editorconfig-checker -config .editorconfig-checker.json

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: crate-ci/typos@5374cbf686e897b15713110e233094e2874de7ef # v1.46.1
        with:
          config: .typos.toml

  # Cross-job rollup so the master ruleset can require a single check
  # for this workflow. Add new lint jobs above and append to `needs:`.
  extra-lint-required:
    name: extra-lint required
    if: always()
    needs:
      - markdownlint
      - yamllint
      - actionlint
      - editorconfig
      - typos
    runs-on: ubuntu-latest
    steps:
      - name: Verify all extra-lint checks succeeded
        env:
          RESULT: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          if echo "$RESULT" | grep -qE '(failure|cancelled)'; then
            echo "::error::an extra-lint check failed: $RESULT"
            exit 1
          fi
          echo "all extra-lint checks passed: $RESULT"
