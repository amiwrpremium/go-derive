name: gitleaks

# Gitleaks: scans the repo's git history for accidentally-committed
# secrets — private keys, API tokens, anything matching the canonical
# rule set.
#
# Critical for a crypto SDK: a single committed `0x...` private key
# would compromise every wallet that ever signed with it.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '37 4 * * 1' # Mondays at 04:37 UTC (weekly diff)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: scan history
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No license key set → uses the OSS edition. Fine for a public repo.
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
