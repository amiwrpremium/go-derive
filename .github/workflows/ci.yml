name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=golang-version depName=go
  # Patched stdlib for GO-2026-4971 (net Dial/LookupPort NUL panic) and
  # GO-2026-4918 (net/http HTTP/2 SETTINGS_MAX_FRAME_SIZE infinite loop).
  GO_VERSION: '1.25.10'

jobs:
  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Check formatting
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt'd:"
            echo "$unformatted"
            # shellcheck disable=SC2086 # word-split on newlines is intentional — pass each filename as a separate arg.
            gofmt -d $unformatted
            exit 1
          fi

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...

  build:
    name: build (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25.10', '1.26.2']
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go build ./...
      - run: go build ./examples/...

  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25.10', '1.26.2']
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Run tests with coverage
        # Exclude examples/ from -coverpkg so demo programs (zero unit tests)
        # don't deflate the percentage. examples/ is also ignored by
        # codecov.yml and .codacy.yml.
        run: |
          set -euo pipefail
          PKGS=$(go list ./... | grep -v '/examples/' | paste -sd, -)
          TESTABLE=$(go list ./... | grep -v '/examples/')
          # shellcheck disable=SC2086 # word-split on $TESTABLE is intentional — pass each package as a separate arg.
          go test -race -coverprofile=coverage.txt -covermode=atomic \
                  -coverpkg="$PKGS" $TESTABLE
      - name: Upload coverage to Codecov
        if: matrix.go == '1.25'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.txt
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Convert Go coverage to LCOV for Codacy
        if: matrix.go == '1.25' && env.CODACY_PROJECT_TOKEN != ''
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euo pipefail
          # Codacy's reporter accepts LCOV / JaCoCo XML / Cobertura XML —
          # not Go's atomic-covermode format. Convert via jandelgado/gcov2lcov
          # (a single-binary Go tool) before upload.
          go install github.com/jandelgado/gcov2lcov@v1.1.1
          gcov2lcov -infile coverage.txt -outfile coverage.lcov

      - name: Upload coverage to Codacy
        if: matrix.go == '1.25' && env.CODACY_PROJECT_TOKEN != ''
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        # Replaces the previous `bash <(curl -Ls ...)` install-on-every-run.
        # The official Action is SHA-pinned (Renovate keeps it current) and
        # satisfies Scorecard's PinnedDependenciesID instead of triggering it.
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.lcov

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        # renovate: datasource=go depName=golang.org/x/vuln
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify go.mod and go.sum are tidy
        run: |
          set -euo pipefail
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' locally."
            exit 1
          fi

  examples:
    name: examples build
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build -o /dev/null ./examples/...

  hooks-config:
    name: lefthook config
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install lefthook
        # renovate: datasource=go depName=github.com/evilmartians/lefthook
        # Pinned to the latest v1 release. v2.x renamed the module path
        # to github.com/evilmartians/lefthook/v2 — a separate migration.
        run: go install github.com/evilmartians/lefthook@v1.13.6
      - name: Validate lefthook.yml
        # `dump` reads + parses the config; non-zero exit on any schema or
        # YAML error. Cheaper than `lefthook install` and runs without a
        # writable .git/hooks dir.
        run: lefthook dump

  # Single rollup job for branch protection — when GitHub asks "did the
  # required CI pass?", the answer is just this one check. Add new PR
  # jobs to `needs:` below; branch protection never needs to be edited.
  required:
    name: required checks
    if: always()
    needs:
      - fmt
      - vet
      - build
      - test
      - govulncheck
      - tidy
      - examples
      - hooks-config
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks succeeded
        env:
          RESULT: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          if echo "$RESULT" | grep -qE '(failure|cancelled)'; then
            echo "::error::a required check failed: $RESULT"
            exit 1
          fi
          echo "all required checks passed: $RESULT"
