name: gosec

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  gosec:
    name: gosec security scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.3'
          cache: true
      - name: Run Gosec
        # gosec releases work like this: maintainers tag e.g. v2.26.1, then push a
        # follow-up commit on master that bumps the action's bundled gosec binary
        # to that version. Pinning to the post-release master commit is therefore
        # *newer* than pinning to the tag itself; pinning to the tag would run an
        # older gosec. Renovate should keep this on the latest such post-release SHA.
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770 # v2.26.1+1 (master)
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif -exclude-dir=examples -exclude-dir=test ./...'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        if: always()
        with:
          sarif_file: gosec.sarif
