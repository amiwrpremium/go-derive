name: labeler

# Apply path-based labels (`area:auth`, `area:rest`, …) to every PR.
# The mapping lives in `.github/labeler.yml`; the label palette is
# declared in `.github/settings.yml`. Runs on `pull_request_target`
# so it can label PRs from forks (the workflow file from base, not
# the PR head, runs — never executes untrusted PR code).

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: apply labels
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
          dot: true
