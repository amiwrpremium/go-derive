name: trivy

# Trivy: filesystem + secret + config (misconfiguration) scanning.
#
# Runs on every push/PR plus a daily cron — Trivy's vulnerability
# database updates frequently and a stale scan can miss a same-day
# CVE published against a transitive Go dep.
#
# `severity: CRITICAL,HIGH` keeps signal-to-noise high; lower-severity
# findings still get uploaded to GitHub code scanning via SARIF.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '17 5 * * *' # daily at 05:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-fs:
    name: trivy filesystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF
      pull-requests: read
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy filesystem scan (vuln + license)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,license
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false

      - name: Upload Trivy FS results to code scanning
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-secret:
    name: trivy secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # full history so secret-scan covers older commits

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload Trivy secrets to code scanning
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

  trivy-config:
    name: trivy config (IaC)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy config scan (workflows, dockerfiles, IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy config to code scanning
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
