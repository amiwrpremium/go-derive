'area:ci':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '.editorconfig'
          - 'renovate.json'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'go.mod'
          - 'go.sum'
